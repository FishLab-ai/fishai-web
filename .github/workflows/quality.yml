name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: TypeCheck + Lint + Format + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript 类型检查
        run: npm run typecheck

      - name: ESLint 代码检查
        run: npm run lint

      - name: Prettier 格式检查
        run: npm run format:check

      - name: Jest 单元测试
        run: npm run test:ci

      - name: 构建
        run: npm run build
        env:
          API_SERVER_URL: http://localhost:3001
